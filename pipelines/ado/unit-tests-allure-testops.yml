name: unit-tests-allure-testops-$(Date:yyyyMMdd)$(Rev:.r)

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - unit/*

pr: none

pool:
  vmImage: ubuntu-latest

variables:
  pythonVersion: "3.12"
  nodeVersion: "20.x"

steps:
  - checkout: self
    clean: true

  - task: UsePythonVersion@0
    displayName: Use Python $(pythonVersion)
    inputs:
      versionSpec: $(pythonVersion)

  - task: NodeTool@0
    displayName: Use Node.js $(nodeVersion)
    inputs:
      versionSpec: $(nodeVersion)

  - script: |
      npm install --global allure @allurereport/plugin-testops
    displayName: Install Allure TestOps CLI dependencies

  - script: |
      python -m venv .venv
      .venv/bin/python3 -m pip install --upgrade pip
      .venv/bin/python3 -m pip install -r requirements.txt
    displayName: Install unit test dependencies
    workingDirectory: unit

  - script: |
      npx allure run --config ./allurerc.testops.mjs -- .venv/bin/python3 -m pytest --alluredir allure-results
    displayName: Run unit tests and upload to Allure TestOps
    workingDirectory: unit
    env:
      CI: "true"
      TESTOPS_URL: $(TESTOPS_URL)
      TESTOPS_TOKEN: $(TESTOPS_TOKEN)
      TESTOPS_PROJECT_ID: $(TESTOPS_PROJECT_ID)

  - script: |
      mkdir -p allure-results
    displayName: Ensure unit test artifacts exist
    condition: always()
    workingDirectory: unit

  - task: PublishPipelineArtifact@1
    displayName: Publish raw Allure result files
    condition: always()
    inputs:
      targetPath: unit/allure-results
      artifact: unit-allure-testops-results
      publishLocation: pipeline
