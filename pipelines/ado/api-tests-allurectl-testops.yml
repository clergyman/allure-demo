name: api-tests-allurectl-testops-$(Date:yyyyMMdd)$(Rev:.r)

trigger: none
pr: none

pool:
  vmImage: ubuntu-latest

variables:
  - name: pythonVersion
    value: "3.12"

steps:
  - checkout: self
    clean: true

  - task: UsePythonVersion@0
    displayName: Use Python $(pythonVersion)
    inputs:
      versionSpec: $(pythonVersion)

  - script: |
      python -m venv .venv
      .venv/bin/python3 -m pip install --upgrade pip
      .venv/bin/python3 -m pip install -r requirements.txt
    displayName: Install API test dependencies
    workingDirectory: API

  - script: |
      wget https://github.com/allure-framework/allurectl/releases/latest/download/allurectl_linux_amd64 -O ./allurectl
      chmod +x ./allurectl
    displayName: Install allurectl
    workingDirectory: API

  - script: |
      ./allurectl watch -- .venv/bin/python3 -m pytest --alluredir allure-results
    displayName: Run pytest API tests and upload to Allure TestOps
    workingDirectory: API
    env:
      DEMO_DISABLE_FLAKES: "0"
      ALLURE_ENDPOINT: $(ALLURE_ENDPOINT)
      ALLURE_TOKEN: $(ALLURE_TOKEN)
      ALLURE_PROJECT_ID: $(ALLURE_PROJECT_ID)
      ALLURE_RESULTS: allure-results
      ALLURE_LAUNCH_NAME: "API Tests Azure DevOps pytest"

