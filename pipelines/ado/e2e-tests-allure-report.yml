name: e2e-tests-allure-report-$(Date:yyyyMMdd)$(Rev:.r)

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - E2E/*

pr: none

pool:
  vmImage: ubuntu-latest

variables:
  nodeVersion: "20.x"

steps:
  - checkout: self
    clean: true

  - task: NodeTool@0
    displayName: Use Node.js $(nodeVersion)
    inputs:
      versionSpec: $(nodeVersion)

  - script: |
      npm ci
    displayName: Install E2E dependencies
    workingDirectory: E2E

  - script: |
      npx playwright install --with-deps
    displayName: Install Playwright browsers
    workingDirectory: E2E

  - script: |
      npx allure run --config ./allurerc.mjs -- npx playwright test
    displayName: Run E2E tests with Allure Report
    workingDirectory: E2E

  - script: |
      mkdir -p allure-results
      mkdir -p allure-report
    displayName: Ensure E2E report artifacts exist
    condition: always()
    workingDirectory: E2E

  - task: PublishAllureReport@2
    displayName: Publish E2E Allure Report
    condition: always()
    inputs:
      reportDir: E2E/allure-report
      reportName: E2E Tests Allure Report

  - task: PublishPipelineArtifact@1
    displayName: Publish raw Allure result files
    condition: always()
    inputs:
      targetPath: E2E/allure-results
      artifact: e2e-allure-results
      publishLocation: pipeline

  - task: PublishPipelineArtifact@1
    displayName: Publish Playwright test results
    condition: always()
    inputs:
      targetPath: E2E/test-results
      artifact: e2e-playwright-test-results
      publishLocation: pipeline
