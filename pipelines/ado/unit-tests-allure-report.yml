name: unit-tests-allure-report-$(Date:yyyyMMdd)$(Rev:.r)

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - unit/*

pr: none

pool:
  vmImage: ubuntu-latest

variables:
  pythonVersion: "3.12"
  nodeVersion: "20.x"

steps:
  - checkout: self
    clean: true

  - task: UsePythonVersion@0
    displayName: Use Python $(pythonVersion)
    inputs:
      versionSpec: $(pythonVersion)

  - task: NodeTool@0
    displayName: Use Node.js $(nodeVersion)
    inputs:
      versionSpec: $(nodeVersion)

  - script: |
      npm install --global allure
    displayName: Install Allure Report CLI

  - script: |
      python -m venv .venv
      .venv/bin/python3 -m pip install --upgrade pip
      .venv/bin/python3 -m pip install -r requirements.txt
    displayName: Install unit test dependencies
    workingDirectory: unit

  - script: |
      npx allure run --config ./allurerc.mjs -- .venv/bin/python3 -m pytest --alluredir allure-results
    displayName: Run unit tests with Allure Report
    workingDirectory: unit

  - script: |
      mkdir -p allure-results
      mkdir -p allure-report
    displayName: Ensure unit test artifacts exist
    condition: always()
    workingDirectory: unit

  - task: PublishAllureReport@2
    displayName: Publish Unit Allure Report
    condition: always()
    inputs:
      reportDir: unit/allure-report
      reportName: Unit Tests Allure Report

  - task: PublishPipelineArtifact@1
    displayName: Publish raw Allure result files
    condition: always()
    inputs:
      targetPath: unit/allure-results
      artifact: unit-allure-results
      publishLocation: pipeline
